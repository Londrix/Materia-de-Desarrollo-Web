<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de encuesta de opinión</title>
</head>
<body>
    <h1>Encuesta de opinión sobre nuestro Producto</h1>
    <form action="">
        <label for="">Pregunta 1: ¿Qué tan satisfecho está con nuestro nuevo producto? <br>
            <input type="radio" id="satisfecho" name="satisfaccion" value="satisfecho">
            <label for="satisfecho">Satisfecho</label><br>
            <input type="radio" id="neutral" name="satisfaccion" value="neutral">
            <label for="neutral">Neutral</label><br>
            <input type="radio" id="insatisfecho" name="satisfaccion" value="insatisfecho">
            <label for="insatisfecho">Insatisfecho</label><br>
        </label><br>

        <label for="">Pregunta 2: ¿Qué aspectos mejorarías en nuestro producto?<br>
            <input type="checkbox" id="precio" name="aspectos" value=""precio>
            <label for="precio">Precio</label><br>
            <input type="checkbox" id="calidad" name="aspectos" value="calidad">
            <label for="calidad">Calidad</label><br>
            <input type="checkbox" id="servicio" name="aspectos" value="servicio">
            <label for="servicio">Servicio al cliente</label><br>
        </label><br>

        <label for="">Pregunta 3: ¿Recomendarías nuestro producto a otras personas?<br>
            <input type="radio" id="recomendar_si" name="recomendar" value="si">
            <label for="recomendar_si">Sí</label><br>
            <input type="radio" id="recomendar_no" name="recomendar" value="no">
            <label for="recomendar_no">No</label><br>
        </label><br>

        <input type="submit" value="Enviar Encuesta">

    </form>


</body>
</html>
