<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Envío de Fotos para Concurso </title>
</head>
<body>
    
    <h1>Formulario de envios de fotos para concurso</h1>

    <form action="">
        <label for="fecha">Fecha de Captura:</label>
        <input type="date" id="fecha" name="fecha" required><br><br>

        <label for="url">URL de la foto:</label>
        <input type="url" id="url" name="url" required><br><br>

        <label for="hora">Hora de captura:</label>
        <input type="time" id="hora" name="hora" required><br><br>

        <label for="foto">Cargar foto:</label>
        <input type="file" id="foto" name="foto" accept="image/*" required><br><br>

        <input type="submit" value="Enviar Foto">
    </form>
</body>
</html>
