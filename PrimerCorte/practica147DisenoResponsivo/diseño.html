<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño responsivo con CSS</title>

    <!--Enlazamos el archivo CSS para aplicar estilos a nuestra página-->

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--Colocamos el encabezado de la página con un título principal -->
    <header>
        <h1>Mi sitio responsivo</h1>
    </header>
    
    <!-- Creamos una barra de navegación con enlaces a diferentes secciones del sitio -->
    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Sobre nosotros</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Contactos</a></li>
        </ul>
    </nav>

    <!-- Sección principal del contenido con artículos de ejemplo -->
    <section class="contenido"> 
        <article> 
            <h2>Artículo 1</h2> 
            <p>Este es un artículo de ejemplo con información sobre diseño web responsivo.</p> 
        </article> 
        <article> 
            <h2>Artículo 2</h2> 
            <p>Más contenido de prueba para practicar CSS y diseño responsivo.</p> 
        </article> 
    </section> 
  
    <!-- Pie de página con información de copyright -->
    <footer> 
        <p>© 2025 Mi Sitio Web</p> 
    </footer> 
</body> 
</html>
